<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Generator For Wa</title>
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<script src="js/script.js"></script>
</head>
<body background="img/bg.jpg">
	<div class="container">
		<div class="card">
			<h2>Chat Wa Generator</h2>
			<form>
				<label for="tlp">Nomor Telepon:</label>
				<input type="text" id="tlp" name="tlp" class="tlp" autocomplete="off" placeholder="08XXXXXXXXXX">
				<br><br>
				<label for="pesan">Pesan:</label>
				<textarea name="pesan" id="pesan" class="pesan"></textarea>
				<br><br>
				<button type="button" onclick="detectnomor()" class="genbutton">Generate</button>
			</form><br>
			<div>
				<font>Link:</font>
				<font id="link">
					<textarea id="tautan" class="tautan" readonly></textarea>
				</font><br><br>
				<button type="button" onclick="copy()" class="botbutton">Salin Link</button>&nbsp;&nbsp;&nbsp;&nbsp;<button type="button" onclick="location.reload()" class="botbutton">Hapus</button>
			</div>
		</div>
	</div>
</body>
</html>
