<!DOCTYPE html>
<html>
<head>
  <title>Halaman Beranda</title>
  <style>
    /* Menetapkan warna latar belakang */
    body {
      background-color: lightblue;
    }

    /* Menetapkan gaya untuk judul */
    h1 {
      color: white;
      text-align: center;
      font-size: 36px;
      padding: 20px;
    }

    /* Menetapkan gaya untuk paragraf */
    p {
      color: white;
      text-align: center;
      font-size: 18px;
      padding: 10px;
    }

    /* Menetapkan gaya untuk tautan */
    a {
      color: white;
      text-align: center;
      font-size: 18px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Selamat Datang di Beranda</h1>
  <p>Ini adalah halaman beranda Anda.</p>
  <a href="https://www.example.com">Kunjungi situs kami</a>
</body>
</html>
